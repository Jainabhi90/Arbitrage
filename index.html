<!DOCTYPE html>
<html>
<head>
  <title>Arb Detector</title>
  <style>
    body {
      font-family: monospace;
      padding: 20px;
      background: #0f0f0f;
      color: #eee;
    }

    h2 {
      color: #4ade80;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      text-align: left;
      padding: 10px;
      border-bottom: 2px solid #4ade80;
      color: #4ade80;
    }

    td {
      padding: 10px;
      border-bottom: 1px solid #333;
    }

    .arb {
      color: #4ade80;
      font-weight: bold;
    }

    .no-data {
      color: #888;
      padding: 20px 0;
    }
  </style>
</head>
<body>
  <h2>Live Arb Opportunities</h2>
  <p id="status" style="color: #888; font-size: 12px;">Waiting for server...</p>

  <table>
    <thead>
      <tr>
        <th>Market</th>
        <th>YES (A)</th>
        <th>NO (B)</th>
        <th>Total</th>
        <th>Profit</th>
      </tr>
    </thead>
    <tbody id="tbody">
      <tr>
        <td colspan="5" class="no-data">No opportunities found yet.</td>
      </tr>
    </tbody>
  </table>

  <script>
   async function refresh() {
  try {
    const res = await fetch('http://localhost:3000/opportunities')
    const data = await res.json()

    const tbody = document.getElementById('tbody')
    const status = document.getElementById('status')

    status.textContent = `Last scanned: ${data.lastScanned} | Pairs monitored: ${data.totalPairs}`

    if (data.opportunities.length === 0) {
      tbody.innerHTML = '<tr><td colspan="5" class="no-data">No arb opportunities right now. Scanning...</td></tr>'
      return
    }

    tbody.innerHTML = data.opportunities.map(op => `
      <tr>
        <td>${op.market}</td>
        <td>${op.yesPrice.toFixed(3)}</td>
        <td>${op.noPrice.toFixed(3)}</td>
        <td>${op.total.toFixed(3)}</td>
        <td class="arb">+${(op.profit * 100).toFixed(2)}%</td>
      </tr>
    `).join('')

  } catch (err) {
    document.getElementById('status').textContent = 'Server offline - retrying...'
  }
}

setInterval(refresh, 2000)
refresh()
  </script>
</body>
</html>
